<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiring Process Time Report</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --secondary: #94A3B8;
            --background: #F8FAFC;
            --surface: #FFFFFF;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --danger: #EF4444;
            --success: #10B981;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem;
            min-height: 100vh;
        }

        header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        /* Controls / Filters */
        .controls-card {
            background-color: var(--surface);
            padding: 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            display: flex;
            gap: 1.5rem;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
            min-width: 200px;
        }

        .input-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .input-group select, .input-group input {
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: var(--surface);
        }

        .input-group select:focus, .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .export-wrapper {
            position: relative;
        }

        .btn {
            background-color: var(--surface);
            border: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .export-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            background: var(--surface);
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            border: 1px solid var(--border);
            min-width: 240px;
            display: none;
            flex-direction: column;
            z-index: 10;
        }

        .export-menu.active {
            display: flex;
        }

        .export-menu button {
            padding: 0.75rem 1rem;
            text-align: left;
            background: none;
            border: none;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.875rem;
            color: var(--text-main);
        }

        .export-menu button:last-child {
            border-bottom: none;
        }

        .export-menu button:hover {
            background-color: var(--background);
        }

        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            display: none; /* hidden by default until data loads */
        }

        .kpi-card {
            background-color: var(--surface);
            padding: 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
        }

        .kpi-title {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .kpi-value {
            font-size: 1.875rem;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Chart Area */
        .chart-container {
            background-color: var(--surface);
            padding: 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            height: 400px;
            position: relative;
            display: none;
        }

        /* Empty State */
        .empty-state {
            background-color: var(--surface);
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 4rem 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .empty-state svg {
            color: var(--secondary);
            width: 64px;
            height: 64px;
        }

        .empty-state h3 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .empty-state p {
            color: var(--text-muted);
            max-width: 400px;
        }

    </style>
</head>
<body>

    <header>
        <h1>Hiring Process Time Report</h1>
        <div class="export-wrapper">
            <button class="btn btn-primary" id="exportBtn" aria-haspopup="true" aria-expanded="false">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                Export Report
            </button>
            <div class="export-menu" id="exportMenu" role="menu">
                <button role="menuitem">Export Summary Data (.csv)</button>
                <button role="menuitem">Export Detailed Candidates (.csv)</button>
            </div>
        </div>
    </header>

    <div class="controls-card">
        <div class="input-group">
            <label for="pipeline">Pipeline</label>
            <select id="pipeline">
                <option value="">Select Pipeline...</option>
                <option value="engineering">Engineering Pipeline</option>
                <option value="sales">Sales Pipeline</option>
            </select>
        </div>
        <div class="input-group" id="vacancyGroup" style="opacity: 0.5; pointer-events: none;">
            <label for="vacancy">Vacancy (Optional)</label>
            <select id="vacancy">
                <option value="">All Vacancies</option>
                <option value="v1">Senior Frontend Engineer</option>
                <option value="v2">Backend Lead</option>
            </select>
        </div>
        <div class="input-group" id="mrfGroup" style="opacity: 0.5; pointer-events: none;">
            <label for="mrf">MRF Number</label>
            <input type="text" id="mrf" placeholder="e.g. MRF-2026-03">
        </div>
        <div class="input-group">
            <button class="btn btn-primary" id="applyFiltersBtn" style="height: 46px; justify-content: center;">Apply Filters</button>
        </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
        <h3>No Scope Selected</h3>
        <p>Select a Pipeline and apply filters to visualise the time spent across hiring stages. Different pipelines may have varying stage structures.</p>
    </div>

    <!-- KPIs -->
    <div class="kpi-grid" id="kpiGrid">
        <div class="kpi-card">
            <div class="kpi-title">Average Time to Hire</div>
            <div class="kpi-value" id="kpiAvg">--</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-title">Median Time to Hire</div>
            <div class="kpi-value" id="kpiMedian" style="border-left-color: var(--secondary);">--</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-title">Longest Stage Phase</div>
            <div class="kpi-value" id="kpiLongest">--</div>
        </div>
    </div>

    <!-- Chart -->
    <div class="chart-container" id="chartContainer">
        <canvas id="timeChart"></canvas>
    </div>

    <script>
        // UI Interactions
        const exportBtn = document.getElementById('exportBtn');
        const exportMenu = document.getElementById('exportMenu');
        const pipelineSelect = document.getElementById('pipeline');
        const vacancyGroup = document.getElementById('vacancyGroup');
        const mrfGroup = document.getElementById('mrfGroup');
        const applyFiltersBtn = document.getElementById('applyFiltersBtn');
        
        const emptyState = document.getElementById('emptyState');
        const kpiGrid = document.getElementById('kpiGrid');
        const chartContainer = document.getElementById('chartContainer');
        
        // Toggle Export Menu
        exportBtn.addEventListener('click', () => {
            const isExpanded = exportBtn.getAttribute('aria-expanded') === 'true';
            exportBtn.setAttribute('aria-expanded', !isExpanded);
            exportMenu.classList.toggle('active');
        });

        // Close menu onClick outside
        document.addEventListener('click', (e) => {
            if (!exportBtn.contains(e.target) && !exportMenu.contains(e.target)) {
                exportBtn.setAttribute('aria-expanded', 'false');
                exportMenu.classList.remove('active');
            }
        });

        // Pipeline selection unlocks vacancy/MRF
        pipelineSelect.addEventListener('change', (e) => {
            if(e.target.value !== "") {
                vacancyGroup.style.opacity = '1';
                vacancyGroup.style.pointerEvents = 'auto';
                mrfGroup.style.opacity = '1';
                mrfGroup.style.pointerEvents = 'auto';
            } else {
                vacancyGroup.style.opacity = '0.5';
                vacancyGroup.style.pointerEvents = 'none';
                mrfGroup.style.opacity = '0.5';
                mrfGroup.style.pointerEvents = 'none';
            }
        });

        // Mock Data simulation
        let timeChart = null;

        applyFiltersBtn.addEventListener('click', () => {
            if(pipelineSelect.value === "") {
                alert("Please select a pipeline first.");
                return;
            }

            // Hide empty state, show data
            emptyState.style.display = 'none';
            kpiGrid.style.display = 'grid';
            chartContainer.style.display = 'block';

            // Set KPIs
            document.getElementById('kpiAvg').textContent = '28.4 Days';
            document.getElementById('kpiMedian').textContent = '22.0 Days';
            document.getElementById('kpiLongest').textContent = 'Technical Interview';

            renderChart();
        });

        function renderChart() {
            const ctx = document.getElementById('timeChart').getContext('2d');
            
            if(timeChart) {
                timeChart.destroy();
            }

            // Config for Chart.js
            Chart.defaults.font.family = "'Inter', sans-serif";
            Chart.defaults.color = '#64748B';

            timeChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Sourced', 'Applied', 'Phone Screen', 'Technical Interview', 'Culture Fit', 'Offer'],
                    datasets: [
                        {
                            label: 'Average Time (Days)',
                            data: [3, 2, 4, 12, 5, 2.4],
                            backgroundColor: '#4F46E5',
                            borderRadius: 4,
                            barPercentage: 0.8,
                            categoryPercentage: 0.8
                        },
                        {
                            label: 'Median Time (Days)',
                            data: [2, 1, 3, 9, 5, 2],
                            backgroundColor: '#94A3B8',
                            borderRadius: 4,
                            barPercentage: 0.8,
                            categoryPercentage: 0.8
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            align: 'end',
                            labels: {
                                usePointStyle: true,
                                boxWidth: 8
                            }
                        },
                        tooltip: {
                            backgroundColor: '#0F172A',
                            titleFont: { size: 13 },
                            bodyFont: { size: 13 },
                            padding: 12,
                            cornerRadius: 8,
                            displayColors: true
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: '#E2E8F0',
                                drawBorder: false
                            },
                            title: {
                                display: true,
                                text: 'Duration (Days)'
                            }
                        },
                        x: {
                            grid: {
                                display: false,
                                drawBorder: false
                            }
                        }
                    },
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    }
                }
            });
        }
    </script>
</body>
</html>
